<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitIQ — Build Your Profile</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <style>
    /* Builder-page specific styles */

    /* Outer layout: sidebar + main content */
    .builder-layout {
      display: flex;
      min-height: calc(100vh - 64px); /* subtract navbar height */
    }

    /* LEFT SIDEBAR — shows what sections have been filled */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Each section in the sidebar */
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .sidebar-item.active {
      background: rgba(56,189,248,0.1);
      color: var(--accent);
    }
    .sidebar-item.done {
      color: #34d399;
    }
    .sidebar-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sidebar-item.active .sidebar-dot { background: var(--accent); }
    .sidebar-item.done  .sidebar-dot { background: #34d399; }

    /* MAIN CONTENT AREA */
    .builder-main {
      flex: 1;
      padding: 48px 64px;
      max-width: 720px;
    }

    /* Top bar: progress + label */
    .progress-bar-area {
      margin-bottom: 48px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* The question card */
    .q-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
    }

    /* Question heading */
    .q-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    /* Row of buttons at bottom of question card */
    .q-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
    }

    /* AI suggestion card shown below the input */
    .ai-tip {
      background: rgba(56,189,248,0.05);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 12px;
    }
    #ai-suggestion { margin-top: 12px; }

    /* Compile overlay — shown while Gemini processes everything */
    #compile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
    }
    #compile-overlay h2 { font-size: 1.6rem; color: var(--text); }
    #compile-overlay p  { color: var(--text-muted); max-width: 340px; }

    /* Spinning ring loader */
    .spin-ring {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile: hide sidebar */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .builder-main { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">Recruit<span>IQ</span></a>
    <div class="nav-links">
      <span id="user-greeting" style="color:var(--text-muted); font-size:0.85rem;"></span>
      <button class="btn btn-ghost btn-sm" onclick="logoutUser()">Log out</button>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="builder-layout">

    <!-- LEFT SIDEBAR: Section tracker -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Your Profile</div>
      <!-- These items are generated dynamically by JS -->
      <div class="sidebar-item active">
        <div class="sidebar-dot"></div> Personal Info
      </div>
      <div class="sidebar-item">
        <div class="sidebar-dot"></div> Education
      </div>
      <div class="sidebar-item">
        <div class="sidebar-dot"></div> Skills
      </div>
      <div class="sidebar-item">
        <div class="sidebar-dot"></div> Experience
      </div>
      <div class="sidebar-item">
        <div class="sidebar-dot"></div> Projects
      </div>
      <div class="sidebar-item">
        <div class="sidebar-dot"></div> Extras
      </div>
    </aside>

    <!-- MAIN BUILDER AREA -->
    <main class="builder-main">

      <!-- Progress bar at top -->
      <div class="progress-bar-area">
        <div class="progress-meta">
          <span>Building your profile</span>
          <span id="progress-label">0% complete</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- This div is replaced every time renderQuestion() runs -->
      <div id="q-container"></div>

    </main>
  </div>

  <!-- COMPILE OVERLAY -->
  <!-- Shown when AI is generating the final profile -->
  <div id="compile-overlay">
    <div class="spin-ring"></div>
    <h2>✦ Building your profile</h2>
    <p>AI is compiling your answers into a professional profile. This takes a few seconds...</p>
    <div class="ai-thinking" style="justify-content:center;">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Load shared utilities first, then builder logic -->
  <script src="app.js"></script>
  <script src="builder.js"></script>

  <script>
    // Show user's name in navbar after page loads
    window.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if (user) {
        document.getElementById('user-greeting').textContent =
          'Hey, ' + (user.name || user.email).split(' ')[0] + ' 👋';
      }
    });
  </script>

</body>
</html>
