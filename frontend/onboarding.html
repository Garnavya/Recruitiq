<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitIQ — Sign Up / Log In</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <style>
    /* ── Onboarding page specific styles ── */

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* The white-ish card that holds the form */
    .auth-box {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      /* subtle glow around the card */
      box-shadow: 0 0 60px rgba(56,189,248,0.06);
    }

    .auth-logo {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .auth-logo span { color: var(--accent); }

    .auth-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* Tab switcher: Sign Up / Log In */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #0d1117;
    }

    /* Role selector cards */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .role-card {
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .role-card:hover { border-color: rgba(56,189,248,0.4); background: var(--card-hover); }
    .role-card.selected { border-color: var(--accent); background: rgba(56,189,248,0.08); }
    .role-card .role-icon { font-size: 1.6rem; margin-bottom: 6px; }
    .role-card .role-label { font-size: 0.82rem; font-weight: 500; color: var(--text); }

    /* Error message area */
    .error-msg {
      color: #f87171;
      font-size: 0.83rem;
      margin-top: -12px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* Bottom text "Already have account?" */
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

  </style>
</head>
<body>

  <!-- Navbar with just logo -->
  <nav class="navbar">
    <a href="index.html" class="logo">Recruit<span>IQ</span></a>
    <div></div>
  </nav>

  <div class="auth-page">
    <div class="auth-box" id="auth-box">

      <!-- Logo + subtitle -->
      <div class="auth-logo">Recruit<span>IQ</span></div>
      <p class="auth-sub" id="auth-sub-text">Create your account to get started</p>

      <!-- Tab switcher -->
      <div class="tabs">
        <div class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
        <div class="tab"        id="tab-login"  onclick="switchTab('login')">Log In</div>
      </div>

      <!-- SIGN UP FORM -->
      <div id="form-signup">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="input" id="su-name" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="input" id="su-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="input" id="su-pass" placeholder="At least 6 characters" />
        </div>

        <!-- Role selector — candidate or recruiter -->
        <label style="margin-bottom:10px;">I am a...</label>
        <div class="role-grid">
          <div class="role-card selected" id="role-candidate" onclick="selectRole('candidate')">
            <div class="role-icon">🎓</div>
            <div class="role-label">Candidate / Student</div>
          </div>
          <div class="role-card" id="role-recruiter" onclick="selectRole('recruiter')">
            <div class="role-icon">🏢</div>
            <div class="role-label">Recruiter / HR</div>
          </div>
        </div>

        <div class="error-msg" id="su-error"></div>

        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="handleSignup()">
          Create Account →
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login" style="display:none;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="input" id="li-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="input" id="li-pass" placeholder="Your password" />
        </div>

        <div class="error-msg" id="li-error"></div>

        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="handleLogin()">
          Log In →
        </button>

        <!-- Demo login helper — fills in demo credentials -->
        <div style="margin-top:12px; text-align:center;">
          <button class="btn btn-ghost btn-sm" onclick="fillDemo()" style="font-size:0.78rem;">
            Use demo account
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
  <script>
    // Currently selected role (candidate or recruiter)
    let selectedRole = 'candidate';

    // Tab switcher
    function switchTab(tab) {
      const isSignup = tab === 'signup';
      document.getElementById('form-signup').style.display = isSignup ? 'block' : 'none';
      document.getElementById('form-login').style.display  = isSignup ? 'none'  : 'block';
      document.getElementById('tab-signup').classList.toggle('active', isSignup);
      document.getElementById('tab-login').classList.toggle('active', !isSignup);
      document.getElementById('auth-sub-text').textContent = isSignup
        ? 'Create your account to get started'
        : 'Welcome back — log in to continue';
    }

    // Role selector 
    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-candidate').classList.toggle('selected', role === 'candidate');
      document.getElementById('role-recruiter').classList.toggle('selected', role === 'recruiter');
    }

    // Sign Up handler 
    function handleSignup() {
      const name  = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const pass  = document.getElementById('su-pass').value;
      const errEl = document.getElementById('su-error');

      // Basic validation
      if (!name || !email || !pass) {
        showError(errEl, 'Please fill in all fields.'); return;
      }
      if (pass.length < 6) {
        showError(errEl, 'Password must be at least 6 characters.'); return;
      }

      const result = registerUser(name, email, pass, selectedRole);
      if (!result.ok) { showError(errEl, result.msg); return; }

      // Auto login after signup
      loginUser(email, pass);
      // Redirect based on role
      redirectAfterAuth(selectedRole);
    }

    // Login handler 
    function handleLogin() {
      const email = document.getElementById('li-email').value.trim();
      const pass  = document.getElementById('li-pass').value;
      const errEl = document.getElementById('li-error');

      if (!email || !pass) { showError(errEl, 'Please enter email and password.'); return; }

      const result = loginUser(email, pass);
      if (!result.ok) { showError(errEl, result.msg); return; }

      redirectAfterAuth(result.user.role);
    }

    // Fill demo credentials
    function fillDemo() {
      document.getElementById('li-email').value = 'hire-me@anshumat.org';
      document.getElementById('li-pass').value  = 'HireMe@2025!';
      showToast('Demo credentials filled — click Log In');
    }

    // Redirect after login/signup
    function redirectAfterAuth(role) {
      if (role === 'recruiter') {
        window.location.href = 'recruiter.html';
      } else {
        // Check if candidate already has a profile
        const user = getCurrentUser();
        if (user && user.profileData) {
          window.location.href = 'preview.html'; // already built profile
        } else {
          window.location.href = 'builder.html'; // start building
        }
      }
    }

    // Show error helper
    function showError(el, msg) {
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    // If already logged in, redirect immediately
    window.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if (user) redirectAfterAuth(user.role);
    });

    // GSAP entrance animation
    window.addEventListener('load', () => {
      if (typeof gsap === 'undefined') return;
      gsap.from('#auth-box', {
        y: 40, opacity: 0, duration: 0.7, ease: 'power3.out'
      });
    });
  </script>
</body>
</html>
