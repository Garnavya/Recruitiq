<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitIQ — Your Profile</title>
  <link rel="stylesheet" href="style.css" />

  <!-- html2pdf.js — turns a div into a downloadable PDF, no server needed -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <style>
    /* ── Preview page styles ── */

    .preview-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px;
    }

    /* ── PROFILE SCORE RING ── */
    .score-ring-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    .score-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0% var(--score-pct, 75%), var(--border) 0%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      /* inner circle trick to make it a ring */
      box-shadow: inset 0 0 0 12px var(--bg-from);
    }

    /* ── RESUME CARD ── */
    /* This is the div that gets converted to PDF */
    #resume-card {
      background: #ffffff;
      color: #1a1a1a;
      border-radius: var(--radius);
      padding: 48px;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.2);
    }

    /* Resume header section */
    .resume-header {
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 24px;
      margin-bottom: 24px;
    }

    .resume-name {
      font-size: 2rem;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      color: #111827;
      margin-bottom: 4px;
    }

    .resume-role {
      font-size: 1rem;
      color: #2563eb; /* blue for target role */
      font-weight: 500;
      margin-bottom: 12px;
    }

    .resume-meta {
      font-size: 0.82rem;
      color: #6b7280;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Resume section headings */
    .resume-section { margin-bottom: 24px; }
    .resume-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #111827;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .resume-section p,
    .resume-section li {
      font-size: 0.88rem;
      color: #374151;
      margin-bottom: 4px;
    }

    .resume-section ul { padding-left: 16px; }

    /* Skills chips inside resume */
    .skill-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .skill-chip {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ── RIGHT SIDEBAR ── */
    .preview-sidebar { display: flex; flex-direction: column; gap: 20px; }

    .action-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .action-card h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text); }

    /* Share link box */
    .share-link-box {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .share-link-box input {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 14px;
      color: var(--text-muted);
      font-size: 0.8rem;
      outline: none;
    }

    .share-link-box button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 0 16px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* Suggested roles */
    .suggested-roles { display: flex; flex-direction: column; gap: 8px; }

    .role-tag {
      padding: 10px 14px;
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.2);
      border-radius: var(--radius-sm);
      color: var(--accent2);
      font-size: 0.85rem;
    }

    /* Mobile */
    @media (max-width: 900px) {
      .preview-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">Recruit<span>IQ</span></a>
    <div class="nav-links">
      <a href="builder.html" class="btn btn-ghost btn-sm">Edit Profile</a>
      <button class="btn btn-ghost btn-sm" onclick="logoutUser()">Log out</button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div style="max-width:1200px; margin:0 auto; padding:40px 32px 0;">
    <div id="page-header">
      <!-- Profile score + name filled by JS -->
    </div>
  </div>

  <!-- MAIN LAYOUT-->
  <div class="preview-layout">

    <!-- LEFT: The actual resume card (printable) -->
    <div>
      <div id="resume-card">
        <!-- Resume content filled by JS below -->
        <p style="color:#aaa; text-align:center; padding:40px;">Loading profile...</p>
      </div>
    </div>

    <!-- RIGHT: Action sidebar -->
    <aside class="preview-sidebar" id="sidebar">
      <!-- Content filled by JS -->
    </aside>

  </div>

  <div id="toast"></div>
  <script src="app.js"></script>

  <script>
    //MAIN: Load profile and render everything
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();

      // Redirect to login if not logged in
      if (!user) { window.location.href = 'onboarding.html'; return; }

      // Redirect to builder if profile not yet built
      if (!user.profileData) { window.location.href = 'builder.html'; return; }

      const p = user.profileData; // shorthand for profileData

      // ── Render page header (score ring + name + badges) ──
      const score = p.profile_score || 70;
      document.getElementById('page-header').innerHTML = `
        <div class="score-ring-wrap" id="header-anim">
          <div class="score-ring" style="--score-pct: ${score}%">${score}</div>
          <div>
            <h1 style="font-size:1.8rem; margin-bottom:4px;">${p.full_name || user.name}</h1>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;">
              <span class="badge">Profile Score: ${score}/100</span>
              ${p.availability ? `<span class="badge badge-green">${p.availability}</span>` : ''}
              ${p.location ? `<span class="badge badge-purple">📍 ${p.location}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="divider"></div>`;

      // ── Build skills array from comma-separated string ──
      const skills = (p.skills || '')
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);

      // ── Build the resume card HTML
      document.getElementById('resume-card').innerHTML = `
        <!-- RESUME HEADER -->
        <div class="resume-header">
          <div class="resume-name">${p.full_name || user.name}</div>
          <div class="resume-role">${p.target_role || 'Software Developer'}</div>
          <div class="resume-meta">
            <span>📧 ${user.email}</span>
            ${p.location   ? `<span>📍 ${p.location}</span>` : ''}
            ${p.github_link ? `<span>🔗 ${p.github_link}</span>` : ''}
          </div>
        </div>

        <!-- PROFESSIONAL SUMMARY (AI-generated) -->
        ${p.ai_summary ? `
        <div class="resume-section">
          <div class="resume-section-title">Professional Summary</div>
          <p>${p.ai_summary}</p>
        </div>` : ''}

        <!-- EDUCATION -->
        ${p.education ? `
        <div class="resume-section">
          <div class="resume-section-title">Education</div>
          <p>${formatMultiline(p.education)}</p>
        </div>` : ''}

        <!-- SKILLS -->
        ${skills.length ? `
        <div class="resume-section">
          <div class="resume-section-title">Technical Skills</div>
          <div class="skill-chips">
            ${skills.map(s => `<span class="skill-chip">${s}</span>`).join('')}
          </div>
        </div>` : ''}

        <!-- EXPERIENCE -->
        ${p.experience ? `
        <div class="resume-section">
          <div class="resume-section-title">Experience</div>
          ${formatBullets(p.experience)}
        </div>` : ''}

        <!-- PROJECTS -->
        ${p.projects ? `
        <div class="resume-section">
          <div class="resume-section-title">Projects</div>
          ${formatBullets(p.projects)}
        </div>` : ''}

        <!-- ACHIEVEMENTS -->
        ${p.achievements ? `
        <div class="resume-section">
          <div class="resume-section-title">Achievements & Certifications</div>
          ${formatBullets(p.achievements)}
        </div>` : ''}

        <!-- SOFT SKILLS + LANGUAGES (grouped) -->
        ${(p.soft_skills || p.languages) ? `
        <div class="resume-section">
          <div class="resume-section-title">Additional</div>
          ${p.soft_skills ? `<p><strong>Soft Skills:</strong> ${p.soft_skills}</p>` : ''}
          ${p.languages   ? `<p><strong>Languages:</strong> ${p.languages}</p>` : ''}
        </div>` : ''}
      `;

      // Build the right sidebar
      const shareUrl = window.location.href + '?uid=' + encodeURIComponent(user.email);
      const suggestedRoles = p.suggested_roles || ['Frontend Developer', 'Web Developer'];

      document.getElementById('sidebar').innerHTML = `
        <!-- DOWNLOAD PDF -->
        <div class="action-card">
          <h3>📄 Download Resume</h3>
          <p style="font-size:0.83rem; margin-bottom:16px;">
            Generate a clean, print-ready PDF from your profile.
          </p>
          <button class="btn btn-primary" style="width:100%; justify-content:center;"
            onclick="downloadPDF()">
            ⬇ Download PDF
          </button>
        </div>

        <!-- SHARE PROFILE -->
        <div class="action-card">
          <h3>🔗 Share Profile</h3>
          <p style="font-size:0.83rem; margin-bottom:12px;">Copy your unique profile link.</p>
          <div class="share-link-box">
            <input type="text" id="share-input" readonly value="${shareUrl}" />
            <button onclick="copyLink()">Copy</button>
          </div>
        </div>

        <!-- AI SUGGESTIONS -->
        ${suggestedRoles.length ? `
        <div class="action-card">
          <h3>✦ AI Role Suggestions</h3>
          <p style="font-size:0.83rem; margin-bottom:12px;">Based on your profile, you'd suit:</p>
          <div class="suggested-roles">
            ${suggestedRoles.map(r => `<div class="role-tag">→ ${r}</div>`).join('')}
          </div>
        </div>` : ''}

        <!-- EDIT / REBUILD -->
        <div class="action-card">
          <h3>✏ Edit Profile</h3>
          <p style="font-size:0.83rem; margin-bottom:12px;">Want to update your answers?</p>
          <a href="builder.html" class="btn btn-ghost" style="width:100%; justify-content:center;">
            Go to Builder
          </a>
        </div>
      `;

      // GSAP entrance
      if (typeof gsap !== 'undefined') {
        gsap.from('#header-anim', { y: 20, opacity: 0, duration: 0.6, ease: 'power2.out' });
        gsap.from('#resume-card', { y: 30, opacity: 0, duration: 0.7, delay: 0.15, ease: 'power2.out' });
        gsap.from('#sidebar .action-card', {
          y: 20, opacity: 0, stagger: 0.12, duration: 0.5, delay: 0.3, ease: 'power2.out'
        });
      }
    });

    // DOWNLOAD PDF
    // html2pdf takes the #resume-card div and saves it as a PDF
    function downloadPDF() {
      const card = document.getElementById('resume-card');
      const user = getCurrentUser();
      const name = (user?.profileData?.full_name || 'Resume').replace(/ /g, '_');

      const opt = {
        margin:      [10, 10, 10, 10],        // top, left, bottom, right (mm)
        filename:    `${name}_Resume.pdf`,
        image:       { type: 'jpeg', quality: 0.97 },
        html2canvas: { scale: 2 },             // scale:2 gives sharper output
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      showToast('⏳ Generating PDF...');
      html2pdf().set(opt).from(card).save().then(() => {
        showToast('✓ PDF downloaded!');
      });
    }

    // COPY SHARE LINK
    function copyLink() {
      const input = document.getElementById('share-input');
      navigator.clipboard.writeText(input.value).then(() => {
        showToast('✓ Link copied to clipboard!');
      });
    }

    // FORMAT HELPERS
    // Convert plain text into HTML paragraph
    function formatMultiline(text) {
      return text.replace(/\n/g, '<br>');
    }

    // Convert bullet-point text (lines starting with - or •) into <ul>
    function formatBullets(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const items = lines.map(l => {
        const clean = l.replace(/^[-•*]\s*/, '');
        return `<li>${clean}</li>`;
      });
      return items.length > 1 ? `<ul>${items.join('')}</ul>` : `<p>${lines.join(' ')}</p>`;
    }
  </script>

</body>
</html>
