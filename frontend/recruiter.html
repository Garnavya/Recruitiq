<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitIQ — Recruiter Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <style>
    /* ── Recruiter dashboard styles ── */

    /* Top stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-num {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); }

    /* Dashboard grid: sidebar + content */
    .dash-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 120px);
    }

    /* LEFT: Candidate list panel */
    .cand-list-panel {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      max-height: calc(100vh - 120px);
    }

    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .panel-header h2 { font-size: 0.95rem; margin-bottom: 12px; }

    /* Search bar inside panel */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
    }

    .search-bar input {
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      width: 100%;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    /* Individual candidate card in the list */
    .cand-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cand-item:hover   { background: var(--card-hover); }

    .cand-item.active  { background: rgba(56,189,248,0.07); border-left: 3px solid var(--accent); }

    /* Avatar circle with initials */
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #0d1117;
      flex-shrink: 0;
    }

    .cand-meta { flex: 1; min-width: 0; }
    
    .cand-name { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .cand-role { font-size: 0.78rem; color: var(--text-muted); }

    /* Shortlisted indicator */
    .shortlist-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #34d399;
      flex-shrink: 0;
    }

    /* RIGHT: Candidate detail view */
    .cand-detail {
      padding: 40px;
      overflow-y: auto;
      max-height: calc(100vh - 120px);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60%;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }

    .empty-state .icon { font-size: 3rem; opacity: 0.3; }

    /* Candidate detail header */
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .detail-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 1.3rem;
      color: #0d1117;
      flex-shrink: 0;
    }

    /* Profile sections in detail view */
    .detail-section { margin-bottom: 28px; }

    .detail-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Skills grid in detail view */
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

    /* Recruiter notes textarea */
    .notes-area {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }

    .notes-area:focus { border-color: var(--accent); }

    /* Compare mode overlay */
    #compare-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(10px);
      z-index: 300;
      padding: 40px;
      overflow-y: auto;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .compare-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    @media (max-width: 768px) {
      .dash-layout { grid-template-columns: 1fr; }
      .cand-list-panel { max-height: 300px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">Recruit<span>IQ</span></a>
    <div class="nav-links">
      <span style="color:var(--text-muted); font-size:0.82rem;" id="rec-greeting"></span>
      <button class="btn btn-ghost btn-sm" onclick="toggleCompare()" id="btn-compare" style="display:none">
        ⊞ Compare Shortlisted
      </button>
      <a href="onboarding.html" class="btn btn-ghost btn-sm" id="nav-login-rec">Log in as Recruiter</a>
      <button class="btn btn-ghost btn-sm" onclick="logoutUser()" id="nav-logout-rec" style="display:none">Log out</button>
    </div>
  </nav>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar">
    <!-- Filled by JS -->
    <div class="stat-item"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Candidates</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-shortlisted">—</div><div class="stat-label">Shortlisted</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-complete">—</div><div class="stat-label">Complete Profiles</div></div>
    <div style="margin-left:auto; display:flex; align-items:center;">
      <span style="font-size:0.8rem; color:var(--text-muted);">Recruiter Dashboard</span>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="dash-layout">

    <!-- LEFT: Candidate list -->
    <div class="cand-list-panel">
      <div class="panel-header">
        <h2>Candidates</h2>
        <!-- Search bar to filter candidates by name/role -->
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search by name or skill..."
            oninput="filterCandidates(this.value)" />
        </div>
        <!-- Filter: show all or just shortlisted -->
        <div style="display:flex; gap:8px; margin-top:10px;">
          <button class="btn btn-sm btn-ghost" id="filter-all" onclick="setFilter('all')" style="flex:1;">All</button>
          <button class="btn btn-sm btn-ghost" id="filter-short" onclick="setFilter('shortlisted')" style="flex:1;">⭐ Shortlisted</button>
        </div>
      </div>

      <!-- Candidate list items rendered by JS -->
      <div id="cand-list"></div>
    </div>

    <!-- RIGHT: Candidate detail / empty state -->
    <div class="cand-detail" id="cand-detail">
      <div class="empty-state" id="empty-state">
        <div class="icon">👤</div>
        <p>Select a candidate to view their profile</p>
      </div>
    </div>

  </div>

  <!--  COMPARE PANEL (fullscreen overlay)  -->
  <div id="compare-panel">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <h2 style="font-size:1.4rem;">Compare Shortlisted Candidates</h2>
      <button class="btn btn-ghost btn-sm" onclick="toggleCompare()">✕ Close</button>
    </div>
    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:16px;">
      Side-by-side comparison of shortlisted profiles.
    </p>
    <div class="compare-grid" id="compare-grid">
      <!-- Filled by JS -->
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>

  <script>
    //  STATE 
    let allCandidates = [];    // full list of candidate users
    let filtered      = [];    // filtered/searched subset
    let activeIdx     = null;  // which candidate is selected
    let filterMode    = 'all'; // 'all' or 'shortlisted'

    //  INIT 
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();

      // Show recruiter info in navbar
      if (user && user.role === 'recruiter') {
        document.getElementById('rec-greeting').textContent = 'Welcome, ' + user.name;
        document.getElementById('nav-logout-rec').style.display = 'flex';
        document.getElementById('nav-login-rec').style.display  = 'none';
        document.getElementById('btn-compare').style.display    = 'flex';
      }

      // Load all candidates from localStorage
      allCandidates = getAllCandidates();
      filtered = [...allCandidates];
      renderList();
      updateStats();

      // GSAP entrance
      if (typeof gsap !== 'undefined') {
        gsap.from('.stats-bar', { y: -20, opacity: 0, duration: 0.5, ease: 'power2.out' });
      }
    });

    //  UPDATE STATS BAR 
    function updateStats() {
      document.getElementById('stat-total').textContent = allCandidates.length;
      document.getElementById('stat-shortlisted').textContent =
        allCandidates.filter(c => c.shortlisted).length;
      document.getElementById('stat-complete').textContent =
        allCandidates.filter(c => c.profileData).length;
    }

    //  RENDER CANDIDATE LIST 
    function renderList() {
      const listEl = document.getElementById('cand-list');

      if (!filtered.length) {
        listEl.innerHTML = `<p style="padding:24px; color:var(--text-muted); font-size:0.85rem; text-align:center;">
          No candidates found.
        </p>`;
        return;
      }

      listEl.innerHTML = filtered.map((c, i) => {
        // Get initials for avatar
        const initials = (c.name || c.email).split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        const role     = c.profileData?.target_role || 'No role set';
        const isActive = activeIdx === i;

        return `<div class="cand-item ${isActive ? 'active' : ''}" onclick="selectCandidate(${i})">
          <div class="avatar">${initials}</div>
          <div class="cand-meta">
            <div class="cand-name">${c.name || c.email}</div>
            <div class="cand-role">${role}</div>
          </div>
          ${c.shortlisted ? '<div class="shortlist-dot"></div>' : ''}
        </div>`;
      }).join('');
    }

    //  SELECT CANDIDATE 
    // Clicking a candidate card shows their full profile on the right
    function selectCandidate(idx) {
      activeIdx = idx;
      renderList(); // re-render list to highlight selected

      const c = filtered[idx];
      const p = c.profileData;
      const detailEl = document.getElementById('cand-detail');
      document.getElementById('empty-state') && (document.getElementById('empty-state').style.display = 'none');

      // If no profile, show a placeholder
      if (!p) {
        detailEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>${c.name || c.email} hasn't built their profile yet.</p>
          </div>`;
        return;
      }

      // Build skills chips
      const skills = (p.skills || '').split(',').map(s => s.trim()).filter(Boolean);
      const initials = (c.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

      // Get saved recruiter notes for this candidate
      const notes = c.recruiterNotes || '';

      detailEl.innerHTML = `
        <!-- Header with name + action buttons -->
        <div class="detail-header" id="detail-head">
          <div style="display:flex; gap:16px; align-items:flex-start;">
            <div class="detail-avatar">${initials}</div>
            <div>
              <h2 style="font-size:1.5rem; margin-bottom:4px;">${p.full_name || c.name}</h2>
              <p style="color:var(--accent); font-size:0.9rem; margin-bottom:10px;">${p.target_role || 'Developer'}</p>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${p.location     ? `<span class="badge badge-purple">📍 ${p.location}</span>` : ''}
                ${p.availability ? `<span class="badge badge-green">${p.availability}</span>`  : ''}
                ${p.profile_score ? `<span class="badge">Score: ${p.profile_score}/100</span>` : ''}
              </div>
            </div>
          </div>

          <!-- Action buttons -->
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn ${c.shortlisted ? 'btn-danger' : 'btn-primary'} btn-sm"
              onclick="toggleShortlist('${c.email}')">
              ${c.shortlisted ? '✕ Remove' : '⭐ Shortlist'}
            </button>
            <a href="mailto:${c.email}" class="btn btn-ghost btn-sm">📧 Contact</a>
          </div>
        </div>

        <!-- AI Summary -->
        ${p.ai_summary ? `
        <div class="detail-section">
          <div class="detail-label">AI Summary</div>
          <div class="card" style="font-size:0.9rem; line-height:1.7; color:var(--text);">
            ${p.ai_summary}
          </div>
        </div>` : ''}

        <!-- Skills -->
        ${skills.length ? `
        <div class="detail-section">
          <div class="detail-label">Skills</div>
          <div class="skills-wrap">
            ${skills.map(s => `<span class="badge">${s}</span>`).join('')}
          </div>
        </div>` : ''}

        <!-- Education -->
        ${p.education ? `
        <div class="detail-section">
          <div class="detail-label">Education</div>
          <p style="color:var(--text); font-size:0.9rem;">${p.education}</p>
        </div>` : ''}

        <!-- Experience -->
        ${p.experience ? `
        <div class="detail-section">
          <div class="detail-label">Experience</div>
          <p style="color:var(--text); font-size:0.9rem; white-space:pre-wrap;">${p.experience}</p>
        </div>` : ''}

        <!-- Projects -->
        ${p.projects ? `
        <div class="detail-section">
          <div class="detail-label">Projects</div>
          <p style="color:var(--text); font-size:0.9rem; white-space:pre-wrap;">${p.projects}</p>
        </div>` : ''}

        <!-- Achievements -->
        ${p.achievements ? `
        <div class="detail-section">
          <div class="detail-label">Achievements</div>
          <p style="color:var(--text); font-size:0.9rem;">${p.achievements}</p>
        </div>` : ''}

        <!-- GitHub link -->
        ${p.github_link ? `
        <div class="detail-section">
          <div class="detail-label">Portfolio / GitHub</div>
          <a href="https://${p.github_link.replace('https://','').replace('http://','')}"
            target="_blank" style="color:var(--accent);">
            🔗 ${p.github_link}
          </a>
        </div>` : ''}

        <!-- Recruiter Notes — editable textarea -->
        <div class="detail-section">
          <div class="detail-label">My Notes (only you see this)</div>
          <textarea class="notes-area" id="notes-${c.email}"
            placeholder="Add your notes about this candidate..."
            oninput="saveNotes('${c.email}', this.value)">${notes}</textarea>
        </div>
      `;

      // Animate detail pane in
      if (typeof gsap !== 'undefined') {
        gsap.from('#detail-head', { x: 20, opacity: 0, duration: 0.4, ease: 'power2.out' });
        gsap.from('.detail-section', {
          y: 15, opacity: 0, stagger: 0.07, duration: 0.35, delay: 0.1, ease: 'power2.out'
        });
      }
    }

    //  TOGGLE SHORTLIST 
    function toggleShortlist(email) {
      const users = JSON.parse(localStorage.getItem('riq_users') || '[]');
      const idx   = users.findIndex(u => u.email === email);
      if (idx === -1) return;

      users[idx].shortlisted = !users[idx].shortlisted;
      localStorage.setItem('riq_users', JSON.stringify(users));

      // Update our local array too
      const local = allCandidates.find(c => c.email === email);
      if (local) local.shortlisted = users[idx].shortlisted;

      showToast(users[idx].shortlisted ? '⭐ Candidate shortlisted' : 'Removed from shortlist');
      updateStats();
      renderList();
      selectCandidate(activeIdx); // re-render detail to update button
    }

    //  SAVE RECRUITER NOTES 
    // Saves notes in real-time as the recruiter types
    let notesTimer = null;
    function saveNotes(email, text) {
      clearTimeout(notesTimer);
      notesTimer = setTimeout(() => {
        updateUser(email, { recruiterNotes: text });
        const c = allCandidates.find(u => u.email === email);
        if (c) c.recruiterNotes = text;
        showToast('✓ Notes saved');
      }, 1000); // debounce: save 1s after last keystroke
    }

    //  SEARCH FILTER 
    function filterCandidates(query) {
      const q = query.toLowerCase();
      const base = filterMode === 'shortlisted'
        ? allCandidates.filter(c => c.shortlisted)
        : allCandidates;

      filtered = base.filter(c =>
        (c.name || '').toLowerCase().includes(q) ||
        (c.email).toLowerCase().includes(q) ||
        (c.profileData?.skills || '').toLowerCase().includes(q) ||
        (c.profileData?.target_role || '').toLowerCase().includes(q)
      );
      activeIdx = null;
      renderList();
    }

    //  FILTER MODE 
    function setFilter(mode) {
      filterMode = mode;
      filtered = mode === 'shortlisted'
        ? allCandidates.filter(c => c.shortlisted)
        : [...allCandidates];
      activeIdx = null;
      renderList();
      // Highlight active filter button
      document.getElementById('filter-all').classList.toggle('btn-primary', mode === 'all');
      document.getElementById('filter-short').classList.toggle('btn-primary', mode === 'shortlisted');
    }

    //  COMPARE PANEL 
    function toggleCompare() {
      const panel = document.getElementById('compare-panel');
      const isOpen = panel.style.display === 'flex';

      if (!isOpen) {
        // Build comparison cards for all shortlisted candidates
        const shortlisted = allCandidates.filter(c => c.shortlisted);
        if (!shortlisted.length) { showToast('No shortlisted candidates yet.'); return; }

        document.getElementById('compare-grid').innerHTML = shortlisted.map(c => {
          const p = c.profileData || {};
          const skills = (p.skills || '').split(',').slice(0, 6).map(s => s.trim()).filter(Boolean);
          return `
            <div class="compare-card">
              <h3 style="font-size:1rem; margin-bottom:4px;">${p.full_name || c.name}</h3>
              <p style="color:var(--accent); font-size:0.82rem; margin-bottom:12px;">${p.target_role || '—'}</p>
              ${p.profile_score ? `<div class="badge" style="margin-bottom:10px;">Score: ${p.profile_score}</div>` : ''}
              <div class="detail-label">Skills</div>
              <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;">
                ${skills.map(s => `<span class="badge badge-purple">${s}</span>`).join('') || '—'}
              </div>
              <div class="detail-label">Education</div>
              <p style="font-size:0.82rem; color:var(--text);">${p.education || '—'}</p>
            </div>`;
        }).join('');

        panel.style.display = 'flex';
        panel.style.flexDirection = 'column';
      } else {
        panel.style.display = 'none';
      }
    }
  </script>

</body>
</html>
